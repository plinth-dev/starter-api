# Local dev stack: Postgres + Cerbos PDP. The starter binary itself is
# typically run with `go run ./cmd/server` (faster iteration) or, for a
# fully containerised setup, `docker compose --profile full up`.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: starter
      POSTGRES_PASSWORD: starter
      POSTGRES_DB: starter
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U starter -d starter"]
      interval: 5s
      timeout: 3s
      retries: 5

  cerbos:
    image: ghcr.io/cerbos/cerbos:0.49.0
    command: ["server", "--config", "/config/config.yaml"]
    ports:
      - "3592:3592"
      - "3593:3593"
    volumes:
      - ./cerbos/policies:/policies:ro
      - ./cerbos/config.yaml:/config/config.yaml:ro
    healthcheck:
      test: ["CMD", "/cerbos", "healthcheck", "--insecure"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    profiles: ["full"]
    build: .
    environment:
      SERVICE_NAME: starter-api
      SERVICE_VERSION: 0.1.0-dev
      MODULE_NAME: items
      APP_ENV: dev
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://starter:starter@postgres:5432/starter?sslmode=disable
      CERBOS_ADDRESS: cerbos:3593
      CERBOS_TLS: "false"
      AUDIT_MEMORY: "true"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      cerbos:
        condition: service_healthy

volumes:
  pgdata:
